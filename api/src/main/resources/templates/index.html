<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
</head>
<body>
    <h1>Gestión de Categorías</h1>

    <!-- 🔹 Mostrar datos del usuario autenticado -->
    <div>
        <p>Bienvenido: <span id="userName"></span></p>
        <p>Email: <span id="userEmail"></span></p>
    </div>

    <form id="categoryForm">
        <label for="description">Nombre de la categoría:</label>
        <input type="text" id="description" required>
        <button type="submit">Agregar categoría</button>
    </form>

    <br>

    <button onclick="loadCategories()">Obtener categorías</button>

    <h2>Lista de categorías</h2>
    <ul id="categoryList"></ul>

    <br>
    <a href="/logout">Cerrar sesión</a>

    <script>
        const API_URL = "/categories";

        async function loadCategories() {
            try {
                const response = await fetch(API_URL);
                const categories = await response.json();

                const list = document.getElementById("categoryList");
                list.innerHTML = "";

                categories.forEach(category => {
                    const li = document.createElement("li");
                    li.textContent = category.description;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error("Error al cargar categorías:", error);
            }
        }

        document.getElementById("categoryForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const description = document.getElementById("description").value;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                        // 🔹 Aquí puedes añadir Authorization si usas JWT
                        // "Authorization": "Bearer " + localStorage.getItem("token")
                    },
                    body: JSON.stringify({ description: description })
                });

                if (response.ok) {
                    alert("Categoría agregada correctamente");
                    document.getElementById("description").value = "";
                    loadCategories();
                } else {
                    alert("Error al agregar categoría");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        });

        // 🔹 NUEVO: Obtener datos del usuario autenticado vía endpoint de Spring Security
        async function loadUserInfo() {
            try {
                const response = await fetch("/user"); // endpoint que devuelve OAuth2User
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById("userName").textContent = user.name;
                    document.getElementById("userEmail").textContent = user.email;
                }
            } catch (error) {
                console.error("Error al cargar usuario:", error);
            }
        }

        // Llamar al cargar la página
        loadUserInfo();
    </script>
</body>
</html>
